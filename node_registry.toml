# Node Registry — the creative writing surface for Intricate's vocabulary.
# Every node type's identity lives here: menu name, tooltip, category,
# icon, and narrative notes. The sidebar menus build themselves from this file.
# Edit freely — Intricate watches for changes and rebuilds menus live.

