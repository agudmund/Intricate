# Intricate — settings.toml
# Shared contract between Intricate and The Settlers.
# Intricate reads and watches this file. The Settlers writes to it.
# Neither project imports the other. This file is the entire handshake.

[window]
width  = 900
height = 700
x      = 100
y      = 100

[canvas]
fog_alpha = 180

[session]
last_loaded = ""

[ui]
sidebar_visible = true

[theme.icons]
# Filenames only — resolved relative to icons/ at the project root.
# The Settlers writes these when the user browses for a new icon.
# Intricate clears its icon cache for the affected key and repaints.
curtains = "iconic.png"
delete   = "iconic.png"
confirm  = "icon_confirm.png"
health   = "health_icon.png"
warm     = "warm_icon.PNG"
about    = "about_icon.png"
bezier   = "bezier_icon.png"
image    = "image_icon.png"

[theme.about]
# Vertical offset (px) applied to the AboutNode label below the button strip.
# Adjust when swapping fonts — positive moves text down, negative moves it up.
font_vertical_offset = 0
font_size = 10
font_color = "#e8f0ff"
bg_color = "#2a2a2a"
bg_color_front = "#322a3a"
bg_alpha = 180
border_color = "#6b5a47"
border_hover_color = "#8a7560"
border_selected_color = "#8a7560"
depth_icon_off = "depth_off.png"
depth_icon_on = "depth_on.png"

[theme.colors]
# Hex strings. The Settlers writes these when the user picks a color.
# Intricate reloads Theme constants and triggers a full scene repaint.
window_bg      = "#282828"
primary_border = "#6b5a47"
text_primary   = "#d2d1cf"
backdrop       = "#2a2a3a"

[apps]
# External app paths — set to an exe path or leave empty to disable.
# warm_editor launches when the WarmNode title zone is double-clicked.
# e.g. warm_editor = "C:\Apps\NotepadDuplex.exe"
warm_editor = "notepad.exe"
